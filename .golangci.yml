# golangci-lint configuration for tfai-go.
# Docs: https://golangci-lint.run/usage/configuration/

version: "2"

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/54b3r/tfai-go

linters:
  default: none
  enable:
    # --- Correctness ---
    - errcheck        # unchecked errors
    - govet           # go vet checks
    - staticcheck     # advanced static analysis (SA*, S*, QF*)
    - ineffassign     # assignments that are never used
    - unused          # unused code

    # --- Security (SRE rules: security is first-class) ---
    - gosec           # security anti-patterns (G101–G601)

    # --- Code quality ---
    - misspell        # common spelling mistakes in comments/strings
    - unconvert       # unnecessary type conversions
    - prealloc        # slice pre-allocation opportunities
    - noctx           # http requests without context
    - bodyclose       # http response body not closed

    # --- Error handling ---
    - errorlint       # errors.Is/As usage
    - wrapcheck       # errors from external packages should be wrapped

  settings:
    gosec:
      excludes:
        # G104: errors unhandled — some are intentionally best-effort
        - G104
        # G117: APIKey field name pattern — these are legitimate credential fields.
        - G117
        # G204: subprocess with variable args — terraform CLI invocation is intentional.
        - G204
        # G301: directory permissions 0755 — standard for Terraform workspaces.
        - G301
        # G304: file path provided as taint input — we handle confinement explicitly
        # via confineToDir(); suppressing here to avoid noise on intentional reads.
        - G304
        # G306: file permissions 0644 — Terraform files need to be readable.
        - G306
        # G703: path traversal via taint — we validate paths via confineToDir().
        - G703
        # G704: SSRF via HTTP client — intentional for calling LLM/embedding APIs.
        - G704
        # G705: XSS via taint — SSE responses are controlled, not user-injected HTML.
        - G705

    errcheck:
      check-type-assertions: true
      check-blank: false  # Allow _ = err pattern for intentionally ignored errors

  exclusions:
    # Test helpers don't need error wrapping or security analysis.
    rules:
      - path: ".*_test\\.go$"
        linters:
          - wrapcheck
          - gosec

      # Provider backend constructors are thin pass-throughs to eino-ext — wrapping
      # the constructor error adds no diagnostic value.
      - path: "internal/provider/backends\\.go$"
        linters:
          - wrapcheck

      # CLI entry points return errors directly to cobra — wrapping adds no value.
      - path: "cmd/tfai/commands/.*\\.go$"
        linters:
          - wrapcheck

      # Server SSE writer errors are best-effort — wrapping adds no value.
      - path: "internal/server/server\\.go$"
        linters:
          - wrapcheck
